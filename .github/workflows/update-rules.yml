name: Generate DNS Rules

on:
  schedule:
    - cron: "15 22 * * *"
  workflow_dispatch:

jobs:
  build_and_release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      CN_DNS: ${{ vars.CN_DNS || 'https://dns.alidns.com/dns-query' }}
      THE_DNS: ${{ vars.THE_DNS || 'https://cloudflare-dns.com/dns-query' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Download latest data
        shell: bash
        run: |
          set -euo pipefail

          download() {
            local url="$1"
            local output="$2"
            curl --fail --show-error --silent --location \
              --retry 3 \
              --retry-delay 2 \
              --connect-timeout 20 \
              --max-time 300 \
              "$url" \
              --output "$output"
          }

          download "https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/cn.list" "cn.list"
          download "https://static-file-global.353355.xyz/rules/cn-additional-list.txt" "cn-additional-list.txt"

      - name: Run conversion script
        shell: bash
        run: |
          set -euo pipefail
          python convert.py | tee update-summary.txt

      - name: Add workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## DNS rule generation summary"
            echo
            if [ -f update-summary.txt ]; then
              echo '```text'
              cat update-summary.txt
              echo '```'
            else
              echo "Conversion summary was not generated."
            fi
            echo
            if [ -f converted/cn-rules.txt ]; then
              echo "- Output file: converted/cn-rules.txt"
              echo "- Output bytes: $(wc -c < converted/cn-rules.txt)"
              echo "- Output lines: $(wc -l < converted/cn-rules.txt)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate generated rules
        shell: bash
        run: |
          set -euo pipefail
          test -s converted/cn-rules.txt
          echo "Generated rules file exists locally and is non-empty."
          wc -l converted/cn-rules.txt

      - name: Download current latest release asset
        id: previous
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p previous-release
          if gh release download latest --pattern cn-rules.txt --dir previous-release --repo "$GITHUB_REPOSITORY"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No previous latest release asset found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f previous-release/cn-rules.txt ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if cmp -s previous-release/cn-rules.txt converted/cn-rules.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update latest tag
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git tag -f latest
          git push -f origin refs/tags/latest

      - name: Publish latest release
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: agh-cn-rules
          body: |
            Auto-generated AdGuard Home DNS split-routing rules.

            - File: `cn-rules.txt`
            - Use with: `upstream_dns_file: /path/to/cn-rules.txt`
          files: converted/cn-rules.txt
          overwrite_files: true
          make_latest: true
