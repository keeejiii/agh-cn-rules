name: Update DNS Rules

on:
  schedule:
    - cron: "0 22 * * *"  # 每天北京时间早上6点左右运行
  workflow_dispatch:

jobs:
  build_and_push:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      CN_DNS: ${{ vars.CN_DNS || 'https://dns.alidns.com/dns-query' }}
      THE_DNS: ${{ vars.THE_DNS || 'https://cloudflare-dns.com/dns-query' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'


      - name: Download latest data
        shell: bash
        run: |
          set -euo pipefail

          download() {
            local url="$1"
            local output="$2"
            curl --fail --show-error --silent --location \
              --retry 3 \
              --retry-delay 2 \
              --connect-timeout 20 \
              --max-time 300 \
              "$url" \
              --output "$output"
          }

          download "https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/cn.list" "cn.list"
          download "https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/google-cn.list" "google-cn.list"
          download "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/microsoft@cn.list" "microsoft-cn.list"
          download "https://static-file-global.353355.xyz/rules/cn-additional-list.txt" "cn-additional-list.txt"

      - name: Run conversion script
        shell: bash
        run: |
          set -euo pipefail
          python convert.py | tee update-summary.txt

      - name: Add workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## DNS rule update summary"
            echo
            if [ -f update-summary.txt ]; then
              echo '```text'
              cat update-summary.txt
              echo '```'
            else
              echo "Conversion summary was not generated."
            fi
            echo
            if [ -f converted/cn-rules.txt ]; then
              echo "- Output file: converted/cn-rules.txt"
              echo "- Output bytes: $(wc -c < converted/cn-rules.txt)"
              echo "- Output lines: $(wc -l < converted/cn-rules.txt)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and Push changes
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "converted/cn-rules.txt" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add -f converted/cn-rules.txt
            if git commit -m "Auto-update DNS rules" -a; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              git push
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Error: cn-rules.txt was not generated."
            exit 1
          fi

      - name: Force update latest tag
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Publish Release
        if: steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest DNS Rules
          body: |
            Auto-generated AdGuard Home DNS split-routing rules.

            - File: `cn-rules.txt`
            - Use with: `upstream_dns_file: /path/to/cn-rules.txt`
          files: converted/cn-rules.txt
